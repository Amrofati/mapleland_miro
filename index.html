<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메이플랜드 미로 최단경로 탐색기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0c0c10;
    font-family: 'Courier New', monospace;
    color: #e2e8f0;
    padding: 28px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; }

  .header { text-align: center; }
  .header .sub { font-size: 10px; letter-spacing: 6px; color: #475569; margin-bottom: 6px; text-transform: uppercase; }
  .header h1 {
    font-size: 26px; font-weight: bold;
    background: linear-gradient(135deg, #a78bfa, #38bdf8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header .desc { font-size: 11px; color: #475569; margin-top: 4px; }

  .card {
    background: #13131b;
    border: 1px solid #1e293b;
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .inputs-row { display: flex; gap: 12px; align-items: flex-end; }
  .input-group { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .input-group label { font-size: 10px; letter-spacing: 3px; color: #64748b; }
  .input-group input {
    width: 100%;
    padding: 12px;
    background: #0f0f18;
    border: 2px solid #1e293b;
    border-radius: 10px;
    color: #e2e8f0;
    font-size: 22px;
    font-weight: bold;
    font-family: inherit;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }
  #input-to { color: #fbbf24; }
  .arrow-mid { color: #334155; font-size: 22px; padding-bottom: 14px; }

  .presets-label { font-size: 10px; color: #334155; letter-spacing: 2px; margin-bottom: 6px; }
  .presets { display: flex; gap: 6px; flex-wrap: wrap; }
  .preset-btn {
    padding: 4px 12px;
    border-radius: 6px;
    border: 1px solid #1e293b;
    background: #0f0f18;
    color: #64748b;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    transition: all 0.15s;
  }
  .preset-btn.active {
    border-color: #f59e0b;
    background: #422006;
    color: #fbbf24;
  }

  .find-btn {
    padding: 13px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #7c3aed, #0369a1);
    color: #fff;
    font-weight: bold;
    font-size: 16px;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 2px;
    transition: opacity 0.2s;
  }
  .find-btn:hover { opacity: 0.85; }

  .error-box {
    padding: 10px; border-radius: 8px;
    background: #1c0a0a; border: 1px solid #7f1d1d;
    color: #fca5a5; font-size: 13px; text-align: center;
  }

  .result-wrap {
    width: 100%; max-width: 420px;
    display: flex; flex-direction: column; gap: 12px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .summary-bar {
    display: flex; justify-content: space-between; align-items: center;
    background: #13131b; border: 1px solid #1e293b;
    border-radius: 12px; padding: 14px 18px;
  }
  .summary-bar .route-title { font-size: 10px; color: #475569; letter-spacing: 2px; }
  .summary-bar .route-name { font-size: 20px; font-weight: bold; color: #a78bfa; margin-top: 2px; }
  .summary-bar .count-label { font-size: 10px; color: #475569; letter-spacing: 2px; text-align: right; }
  .summary-bar .count-num { font-size: 28px; font-weight: bold; color: #38bdf8; text-align: right; }
  .summary-bar .count-unit { font-size: 13px; color: #64748b; margin-left: 4px; }

  .steps-card {
    background: #13131b; border: 1px solid #1e293b;
    border-radius: 12px; padding: 18px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .steps-label { font-size: 10px; color: #475569; letter-spacing: 3px; margin-bottom: 8px; }

  .step-row { display: flex; align-items: center; gap: 10px; }
  .step-num {
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: bold; flex-shrink: 0;
  }
  .step-num.start { background: #7c3aed; color: #fff; }
  .step-num.goal { background: transparent; border: 1px solid #f59e0b; color: #fbbf24; }
  .step-num.mid { background: #1e293b; color: #475569; }

  .step-room {
    flex: 0 0 44px; padding: 6px; border-radius: 8px;
    text-align: center; font-weight: bold; font-size: 18px;
  }
  .step-room.start { background: #3b0764; border: 1px solid #7c3aed; color: #c4b5fd; }
  .step-room.goal { background: #422006; border: 1px solid #f59e0b; color: #fbbf24; }
  .step-room.mid { background: #1a1a2e; border: 1px solid #2d2d45; color: #94a3b8; }

  .portal-arrow { display: flex; align-items: center; gap: 6px; flex: 1; }
  .portal-line { height: 1px; flex: 1; }
  .portal-tag {
    padding: 3px 8px; border-radius: 5px;
    font-size: 11px; font-weight: bold; letter-spacing: 1px; flex-shrink: 0;
  }

  .portal-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .stat-box {
    background: #13131b; border-radius: 10px; padding: 10px; text-align: center;
  }
  .stat-name { font-weight: bold; font-size: 14px; }
  .stat-count { font-size: 22px; font-weight: bold; color: #e2e8f0; }
  .stat-unit { font-size: 10px; color: #475569; }
</style>
</head>
<body>

<div class="header">
  <div class="sub">메이플랜드 루디브리엄 미로찾기</div>
  <h1>최단 경로 탐색기</h1>
  <div class="desc">BFS 알고리즘 · 포탈 최소 이동 횟수 계산</div>
</div>

<div class="card">
  <div class="inputs-row">
    <div class="input-group">
      <label>현재 위치</label>
      <input id="input-from" type="number" min="1" max="16" placeholder="1~16">
    </div>
    <div class="arrow-mid">→</div>
    <div class="input-group">
      <label>목적지</label>
      <input id="input-to" type="number" min="1" max="16" value="16" placeholder="16">
    </div>
  </div>

  <div>
    <div class="presets-label">목적지 빠른 선택</div>
    <div class="presets" id="presets">
      <button class="preset-btn active" data-val="16" onclick="setPreset(this)">16 🏆</button>
      <button class="preset-btn" data-val="1" onclick="setPreset(this)">1</button>
      <button class="preset-btn" data-val="5" onclick="setPreset(this)">5</button>
      <button class="preset-btn" data-val="9" onclick="setPreset(this)">9</button>
      <button class="preset-btn" data-val="13" onclick="setPreset(this)">13</button>
    </div>
  </div>

  <button class="find-btn" onclick="findPath()">⚡ 경로 탐색</button>
  <div id="error-box" class="error-box" style="display:none;"></div>
</div>

<div id="result-wrap" class="result-wrap" style="display:none;"></div>

<script>
const PORTALS = {
  "중": {1:8,2:9,3:10,4:11,5:12,6:13,7:14,8:15,9:16,10:2,11:3,12:4,13:5,14:6,15:7,16:9},
  "우": {7:4,4:1,1:13,13:10,10:7,14:11,11:8,8:5,5:2,2:14,6:3,3:15,15:12,12:9,9:6},
  "좌": {7:11,11:15,15:4,4:8,8:12,12:1,1:5,5:9,9:13,13:2,2:6,6:10,10:14,14:3,3:7}
};
const PORTAL_LABELS = ["좌", "중", "우"];
const PORTAL_COLORS = {
  "좌": { main: "#059669", dark: "#065f46" },
  "중": { main: "#7c3aed", dark: "#4c1d95" },
  "우": { main: "#0369a1", dark: "#0c4a6e" },
};

function bfs(start, goal) {
  if (start === goal) return [{ room: start, portal: null }];
  const queue = [[start, [{ room: start, portal: null }]]];
  const visited = new Set([start]);
  while (queue.length > 0) {
    const [cur, path] = queue.shift();
    for (const portal of PORTAL_LABELS) {
      const next = PORTALS[portal][cur];
      if (!next) continue;
      const newPath = [...path, { room: next, portal }];
      if (next === goal) return newPath;
      if (!visited.has(next)) {
        visited.add(next);
        queue.push([next, newPath]);
      }
    }
  }
  return null;
}

function setPreset(btn) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('input-to').value = btn.dataset.val;
}

document.getElementById('input-to').addEventListener('input', function() {
  document.querySelectorAll('.preset-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.val === this.value);
  });
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') findPath();
});

function showError(msg) {
  const box = document.getElementById('error-box');
  box.textContent = '⚠️ ' + msg;
  box.style.display = 'block';
  document.getElementById('result-wrap').style.display = 'none';
}

function findPath() {
  const fromVal = document.getElementById('input-from').value;
  const toVal = document.getElementById('input-to').value;
  document.getElementById('error-box').style.display = 'none';

  const start = parseInt(fromVal);
  const goal = parseInt(toVal);

  if (!fromVal || isNaN(start) || start < 1 || start > 16) return showError('현재 위치를 1~16 사이로 입력해주세요.');
  if (!toVal || isNaN(goal) || goal < 1 || goal > 16) return showError('목적지를 1~16 사이로 입력해주세요.');
  if (start === goal) return showError('현재 위치와 목적지가 같아요!');

  const path = bfs(start, goal);
  if (!path) return showError('해당 목적지에 도달할 수 없어요.');

  renderResult(start, goal, path);
}

function renderResult(start, goal, path) {
  const steps = path.length - 1;
  const portalCount = { "좌": 0, "중": 0, "우": 0 };
  path.forEach(s => { if (s.portal) portalCount[s.portal]++; });

  let stepsHtml = '';
  path.forEach((step, i) => {
    const isFirst = i === 0;
    const isLast = i === path.length - 1;
    const roomClass = isFirst ? 'start' : isLast ? 'goal' : 'mid';
    const numClass = isFirst ? 'start' : isLast ? 'goal' : 'mid';
    const numLabel = isFirst ? 'S' : isLast ? 'G' : i;

    let arrowHtml = '';
    if (!isLast && step.portal) {
      const pc = PORTAL_COLORS[step.portal];
      arrowHtml = `
        <div class="portal-arrow">
          <div class="portal-line" style="background:linear-gradient(to right,${pc.main}55,${pc.main})"></div>
          <div class="portal-tag" style="background:${pc.dark};border:1px solid ${pc.main};color:${pc.main}">
            ${step.portal} 포탈 →
          </div>
        </div>`;
    }

    stepsHtml += `
      <div class="step-row">
        <div class="step-num ${numClass}">${numLabel}</div>
        <div class="step-room ${roomClass}">${step.room}${isLast && goal === 16 ? ' 🏆' : ''}</div>
        ${arrowHtml}
      </div>`;
  });

  let statsHtml = PORTAL_LABELS.map(p => {
    const pc = PORTAL_COLORS[p];
    const used = portalCount[p] > 0;
    return `
      <div class="stat-box" style="border:1px solid ${used ? pc.main + '55' : '#1e293b'};opacity:${used ? 1 : 0.4}">
        <div class="stat-name" style="color:${pc.main}">${p} 포탈</div>
        <div class="stat-count">${portalCount[p]}</div>
        <div class="stat-unit">회 사용</div>
      </div>`;
  }).join('');

  const wrap = document.getElementById('result-wrap');
  wrap.innerHTML = `
    <div class="summary-bar">
      <div>
        <div class="route-title">최단 경로</div>
        <div class="route-name">${start}번 → ${goal}번${goal === 16 ? ' 🏆' : ''}</div>
      </div>
      <div>
        <div class="count-label">포탈 이동</div>
        <div><span class="count-num">${steps}</span><span class="count-unit">회</span></div>
      </div>
    </div>
    <div class="steps-card">
      <div class="steps-label">STEP BY STEP</div>
      ${stepsHtml}
    </div>
    <div class="portal-stats">${statsHtml}</div>
  `;
  wrap.style.display = 'flex';
}
</script>
</body>
</html>
