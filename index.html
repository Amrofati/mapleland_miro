<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메이플랜드 미로 경로 탐색기</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    min-height:100vh;background:#0c0c10;font-family:'Courier New',monospace;
    color:#e2e8f0;padding:28px 16px;display:flex;flex-direction:column;align-items:center;gap:24px;
  }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
  input[type=number]{-moz-appearance:textfield;}

  .header{text-align:center;}
  .header .sub{font-size:10px;letter-spacing:6px;color:#475569;margin-bottom:6px;text-transform:uppercase;}
  .header h1{
    font-size:26px;font-weight:bold;
    background:linear-gradient(135deg,#a78bfa,#38bdf8);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  }
  .header .desc{font-size:11px;color:#475569;margin-top:4px;}

  .card{
    background:#13131b;border:1px solid #1e293b;border-radius:16px;
    padding:24px;width:100%;max-width:420px;display:flex;flex-direction:column;gap:16px;
  }
  .mode-toggle{display:flex;background:#0f0f18;border:1px solid #1e293b;border-radius:10px;padding:4px;gap:4px;}
  .mode-btn{
    flex:1;padding:8px;border-radius:7px;border:none;background:transparent;color:#64748b;
    font-family:inherit;font-size:12px;font-weight:bold;cursor:pointer;transition:all .2s;
  }
  .mode-btn.active{background:linear-gradient(135deg,#7c3aed,#0369a1);color:#fff;}

  .inputs-row{display:flex;gap:12px;align-items:flex-end;}
  .input-group{flex:1;display:flex;flex-direction:column;gap:8px;}
  .input-group label{font-size:10px;letter-spacing:3px;color:#64748b;}
  .input-group input{
    width:100%;padding:12px;background:#0f0f18;border:2px solid #1e293b;border-radius:10px;
    color:#e2e8f0;font-size:22px;font-weight:bold;font-family:inherit;text-align:center;outline:none;transition:border-color .2s;
  }
  #input-to{color:#fbbf24;}
  .arrow-mid{color:#334155;font-size:22px;padding-bottom:14px;}

  .presets-label{font-size:10px;color:#334155;letter-spacing:2px;margin-bottom:6px;}
  .presets{display:flex;gap:6px;flex-wrap:wrap;}
  .preset-btn{
    padding:4px 12px;border-radius:6px;border:1px solid #1e293b;background:#0f0f18;
    color:#64748b;cursor:pointer;font-family:inherit;font-size:13px;transition:all .15s;
  }
  .preset-btn.active{border-color:#f59e0b;background:#422006;color:#fbbf24;}

  .all-rooms-notice{
    background:#0f1a0f;border:1px solid #16a34a44;border-radius:8px;
    padding:10px 14px;font-size:12px;color:#86efac;line-height:1.6;
  }

  .btn-row{display:flex;gap:8px;}
  .find-btn{
    flex:1;padding:13px;border-radius:10px;border:none;
    background:linear-gradient(135deg,#7c3aed,#0369a1);
    color:#fff;font-weight:bold;font-size:16px;font-family:inherit;cursor:pointer;letter-spacing:2px;transition:opacity .2s;
  }
  .find-btn:hover{opacity:.85;}
  .pip-btn{
    padding:13px 14px;border-radius:10px;border:1px solid #1e293b;
    background:#13131b;color:#64748b;font-size:16px;cursor:pointer;transition:all .2s;white-space:nowrap;
    font-family:inherit;font-weight:bold;
  }
  .pip-btn:hover{border-color:#a78bfa;color:#a78bfa;}
  .pip-btn.active{border-color:#a78bfa;background:#1e1030;color:#a78bfa;}

  .pip-notice{
    background:#0f0f1a;border:1px solid #3730a355;border-radius:8px;
    padding:10px 14px;font-size:11px;color:#818cf8;line-height:1.6;display:none;
  }

  .error-box{
    padding:10px;border-radius:8px;background:#1c0a0a;border:1px solid #7f1d1d;
    color:#fca5a5;font-size:13px;text-align:center;
  }
  .result-wrap{width:100%;max-width:420px;display:flex;flex-direction:column;gap:12px;animation:fadeIn .3s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  .summary-bar{
    display:flex;justify-content:space-between;align-items:center;
    background:#13131b;border:1px solid #1e293b;border-radius:12px;padding:14px 18px;
  }
  .route-title{font-size:10px;color:#475569;letter-spacing:2px;}
  .route-name{font-size:18px;font-weight:bold;color:#a78bfa;margin-top:2px;}
  .count-label{font-size:10px;color:#475569;letter-spacing:2px;text-align:right;}
  .count-num{font-size:28px;font-weight:bold;color:#38bdf8;}
  .count-unit{font-size:13px;color:#64748b;margin-left:4px;}

  .steps-card{
    background:#13131b;border:1px solid #1e293b;border-radius:12px;
    padding:18px;display:flex;flex-direction:column;gap:4px;
  }
  .steps-label{font-size:10px;color:#475569;letter-spacing:3px;margin-bottom:10px;}

  /* ── 포탈 범례 ── */
  .portal-legend{
    display:flex;gap:8px;margin-bottom:12px;padding-bottom:10px;
    border-bottom:1px solid #1e293b;
  }
  .legend-item{
    display:flex;align-items:center;gap:5px;font-size:11px;color:#94a3b8;
  }
  .legend-dot{
    width:10px;height:10px;border-radius:50%;flex-shrink:0;
  }

  .step-row{display:flex;align-items:center;gap:8px;padding:2px 0;}
  .step-num{
    width:22px;height:22px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-size:9px;font-weight:bold;flex-shrink:0;
  }
  .step-num.start{background:#7c3aed;color:#fff;}
  .step-num.goal{background:transparent;border:1px solid #f59e0b;color:#fbbf24;}
  .step-num.mid{background:#1e293b;color:#94a3b8;font-size:8px;}
  .step-room{flex:0 0 42px;padding:5px;border-radius:8px;text-align:center;font-weight:bold;font-size:17px;}
  .step-room.start{background:#3b0764;border:1px solid #7c3aed;color:#c4b5fd;}
  .step-room.goal{background:#422006;border:1px solid #f59e0b;color:#fbbf24;}
  .step-room.mid{background:#1a1a2e;border:1px solid #2d2d45;color:#94a3b8;}

  /* ── 포탈 화살표 (개선) ── */
  .portal-arrow{display:flex;align-items:center;gap:0;flex:1;height:28px;}
  .portal-line{height:2px;flex:1;}

  /* 좌 포탈 */
  .portal-tag.left-portal{
    padding:4px 10px;border-radius:6px;font-size:12px;font-weight:900;
    letter-spacing:1px;flex-shrink:0;
    background:#064e3b;
    border:2px solid #059669;
    color:#34d399;
    text-shadow:0 0 8px #059669aa;
    box-shadow:0 0 6px #05966944;
  }
  /* 중 포탈 */
  .portal-tag.mid-portal{
    padding:4px 10px;border-radius:6px;font-size:12px;font-weight:900;
    letter-spacing:1px;flex-shrink:0;
    background:#2e1065;
    border:2px solid #7c3aed;
    color:#c084fc;
    text-shadow:0 0 8px #7c3aedaa;
    box-shadow:0 0 6px #7c3aed44;
  }
  /* 우 포탈 */
  .portal-tag.right-portal{
    padding:4px 10px;border-radius:6px;font-size:12px;font-weight:900;
    letter-spacing:1px;flex-shrink:0;
    background:#0c2a4a;
    border:2px solid #0ea5e9;
    color:#38bdf8;
    text-shadow:0 0 8px #0ea5e9aa;
    box-shadow:0 0 6px #0ea5e944;
  }

  .portal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .stat-box{background:#13131b;border-radius:10px;padding:10px;text-align:center;}
  .stat-name{font-weight:bold;font-size:14px;}
  .stat-count{font-size:22px;font-weight:bold;color:#e2e8f0;}
  .stat-unit{font-size:10px;color:#475569;}
  .loading-box{padding:24px;border-radius:12px;background:#13131b;border:1px solid #1e293b;text-align:center;color:#64748b;font-size:13px;}
  .spinner{display:inline-block;width:22px;height:22px;border:2px solid #1e293b;border-top-color:#7c3aed;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .impossible-box{padding:18px;border-radius:12px;background:#1c0a0a;border:1px solid #7f1d1d;color:#fca5a5;font-size:13px;text-align:center;line-height:1.7;}
</style>
</head>
<body>

<div class="header">
  <div class="sub">MAPLELAND MAZE NAVIGATOR</div>
  <h1>경로 탐색기</h1>
  <div class="desc">BFS 최단경로 · 전체방 경유 · PiP 오버레이</div>
</div>

<div class="card">
  <div class="mode-toggle">
    <button class="mode-btn" id="btn-mode-short" onclick="setMode('short')">⚡ 최단 경로</button>
    <button class="mode-btn active" id="btn-mode-all" onclick="setMode('all')">🗺️ 모든 방 경유</button>
  </div>
  <div class="inputs-row">
    <div class="input-group">
      <label>현재 위치</label>
      <input id="input-from" type="number" min="1" max="16" placeholder="1~16">
    </div>
    <div class="arrow-mid">→</div>
    <div class="input-group">
      <label>목적지</label>
      <input id="input-to" type="number" min="1" max="16" value="16" placeholder="16">
    </div>
  </div>
  <div>
    <div class="presets-label">목적지 빠른 선택</div>
    <div class="presets">
      <button class="preset-btn active" data-val="16" onclick="setPreset(this)">16 🏆</button>
      <button class="preset-btn" data-val="1" onclick="setPreset(this)">1</button>
      <button class="preset-btn" data-val="5" onclick="setPreset(this)">5</button>
      <button class="preset-btn" data-val="9" onclick="setPreset(this)">9</button>
      <button class="preset-btn" data-val="13" onclick="setPreset(this)">13</button>
    </div>
  </div>
  <div class="all-rooms-notice" id="all-rooms-notice">
    🗺️ <strong>16개 방을 모두 한 번씩 방문</strong>하고 목적지에서 끝나는 경로를 탐색합니다.
  </div>
  <div class="btn-row">
    <button class="find-btn" id="find-btn" onclick="findPath()">🗺️ 전체 경로 탐색</button>
    <button class="pip-btn" id="pip-btn" onclick="togglePip()">📺 PiP</button>
  </div>
  <div class="pip-notice" id="pip-notice">
    📺 <strong>PiP 창이 항상 최상단에 고정됩니다.</strong><br>
    경로 탐색하면 PiP 창에 자동으로 표시돼요.
  </div>
  <div id="error-box" class="error-box" style="display:none;"></div>
</div>

<div id="result-wrap" class="result-wrap" style="display:none;"></div>

<script>
const PORTALS={
  "중":{1:8,2:9,3:10,4:11,5:12,6:13,7:14,8:15,9:16,10:2,11:3,12:4,13:5,14:6,15:7,16:9},
  "우":{7:4,4:1,1:13,13:10,10:7,14:11,11:8,8:5,5:2,2:14,6:3,3:15,15:12,12:9,9:6},
  "좌":{7:11,11:15,15:4,4:8,8:12,12:1,1:5,5:9,9:13,13:2,2:6,6:10,10:14,14:3,3:7}
};
const PORTAL_LABELS=["좌","중","우"];

// 포탈별 스타일 정의
const PORTAL_STYLE={
  "좌":{
    main:"#059669", dark:"#064e3b", text:"#34d399",
    lineColor:"#059669", cls:"left-portal", label:"◀ 좌",
    pipMain:"#059669", pipDark:"#064e3b"
  },
  "중":{
    main:"#7c3aed", dark:"#2e1065", text:"#c084fc",
    lineColor:"#7c3aed", cls:"mid-portal", label:"● 중",
    pipMain:"#7c3aed", pipDark:"#2e1065"
  },
  "우":{
    main:"#0ea5e9", dark:"#0c2a4a", text:"#38bdf8",
    lineColor:"#0ea5e9", cls:"right-portal", label:"▶ 우",
    pipMain:"#0ea5e9", pipDark:"#0c2a4a"
  }
};

let currentMode='all'; // 기본값: 모든 방 경유
let pipWin=null;
let lastPath=null;

// ── PiP CSS ───────────────────────────────────────────────
const PIP_CSS=`
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f;}
  body{font-family:'Courier New',monospace;color:#e2e8f0;display:flex;flex-direction:column;}
  #hd{background:#111118;border-bottom:1px solid #1e293b;padding:6px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  #hd .t{font-size:10px;letter-spacing:3px;color:#475569;}
  #hd .b{font-size:10px;padding:2px 7px;border-radius:4px;background:#7c3aed22;border:1px solid #7c3aed55;color:#a78bfa;}
  #pb{height:2px;background:#1e293b;flex-shrink:0;}
  #pf{height:100%;background:linear-gradient(to right,#7c3aed,#38bdf8);width:0%;transition:width .3s;}
  #lg{display:flex;gap:10px;padding:6px 8px;background:#0d0d16;border-bottom:1px solid #1e293b;flex-shrink:0;}
  .li{display:flex;align-items:center;gap:4px;font-size:9px;}
  .ld{width:8px;height:8px;border-radius:50%;}
  #ct{flex:1;overflow-y:auto;padding:6px 6px;display:flex;flex-direction:column;gap:2px;}
  #ct::-webkit-scrollbar{width:3px;}
  #ct::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px;}
  .wait{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#334155;font-size:11px;text-align:center;gap:8px;padding:20px;}
  .wait .ic{font-size:26px;}
  .st{display:flex;align-items:center;gap:5px;padding:3px 2px;border-bottom:1px solid #ffffff06;cursor:pointer;border-radius:4px;transition:background .15s;}
  .st:hover{background:#ffffff05;}
  .st:last-child{border-bottom:none;}
  .ix{font-size:9px;color:#334155;width:14px;text-align:right;flex-shrink:0;}
  .rb{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:12px;flex-shrink:0;}
  .rb.s{background:#3b0764;border:1px solid #7c3aed;color:#c4b5fd;}
  .rb.g{background:#422006;border:1px solid #f59e0b;color:#fbbf24;}
  .rb.m{background:#13131b;border:1px solid #2d2d45;color:#94a3b8;transition:all .2s;}
  .aw{flex:1;display:flex;align-items:center;gap:3px;height:24px;}
  .al{flex:1;height:2px;}
  .pl{font-size:10px;font-weight:900;padding:3px 6px;border-radius:4px;white-space:nowrap;border-width:2px;border-style:solid;}
  .st.done .rb.m{background:#0a2010;border-color:#059669;color:#86efac;}
  .st.done .al{opacity:.2;}
  .st.done .pl{opacity:.2;}
  .st.cur .rb.m{background:#1a1040;border-color:#7c3aed;color:#c4b5fd;box-shadow:0 0 6px #7c3aed88;}
  #ft{background:#111118;border-top:1px solid #1e293b;padding:5px 10px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
  #fi{font-size:10px;color:#475569;}
  #fc{font-size:13px;font-weight:bold;color:#38bdf8;}
`;

const PS=PORTAL_STYLE;

function buildPipDOM(doc,path,start,goal,isAllRooms){
  doc.head.innerHTML=`<meta charset="UTF-8"><style>${PIP_CSS}</style>`;
  const totalSteps=path.length-1;

  // 범례
  const lgHtml=`
    <div class="li"><div class="ld" style="background:#059669"></div><span style="color:#34d399">좌 포탈</span></div>
    <div class="li"><div class="ld" style="background:#7c3aed"></div><span style="color:#c084fc">중 포탈</span></div>
    <div class="li"><div class="ld" style="background:#0ea5e9"></div><span style="color:#38bdf8">우 포탈</span></div>`;

  let stepsHtml='';
  path.forEach((step,i)=>{
    const isFirst=i===0,isLast=i===path.length-1;
    const bc=isFirst?'s':isLast?'g':'m';
    const lbl=isFirst?'S':isLast?'G':i;
    let aw='';
    if(!isLast&&step.portal){
      const s=PS[step.portal];
      aw=`<div class="aw">
        <div class="al" style="background:linear-gradient(to right,${s.pipMain}44,${s.pipMain})"></div>
        <div class="pl" style="background:${s.pipDark};border-color:${s.pipMain};color:${s.text};text-shadow:0 0 6px ${s.pipMain}88">${step.portal}</div>
      </div>`;
    }
    stepsHtml+=`<div class="st" data-i="${i}">
      <div class="ix">${lbl}</div>
      <div class="rb ${bc}">${step.room}${isLast&&goal===16?'🏆':''}</div>
      ${aw}
    </div>`;
  });

  doc.body.innerHTML=`
    <div id="hd"><span class="t">🗺 동선 PiP</span><span class="b">${isAllRooms?'전체방':'최단'}</span></div>
    <div id="pb"><div id="pf"></div></div>
    <div id="lg">${lgHtml}</div>
    <div id="ct">${stepsHtml}</div>
    <div id="ft"><span id="fi">${start}번 → ${goal}번${goal===16?' 🏆':''}</span><span id="fc">${totalSteps}회 이동</span></div>`;

  doc.querySelectorAll('.st').forEach(el=>{
    el.addEventListener('click',()=>{
      const idx=parseInt(el.dataset.i);
      doc.querySelectorAll('.st').forEach((s,i)=>{
        s.classList.remove('done','cur');
        if(i<idx)s.classList.add('done');
        if(i===idx)s.classList.add('cur');
      });
      doc.getElementById('pf').style.width=(totalSteps>0?Math.round((idx/totalSteps)*100):0)+'%';
    });
  });
}

async function togglePip(){
  const btn=document.getElementById('pip-btn');
  const notice=document.getElementById('pip-notice');
  if(pipWin){
    pipWin.close();pipWin=null;
    btn.classList.remove('active');btn.textContent='📺 PiP';
    notice.style.display='none';return;
  }
  if(!('documentPictureInPicture' in window)){
    alert('⚠️ Chrome 116+ 이상에서 지원됩니다.\n일반 팝업으로 대신 열립니다.');
    openFallbackPip();return;
  }
  try{
    pipWin=await documentPictureInPicture.requestWindow({width:260,height:520});
    btn.classList.add('active');btn.textContent='📺 PiP 켜짐';
    notice.style.display='block';
    pipWin.addEventListener('pagehide',()=>{
      pipWin=null;btn.classList.remove('active');btn.textContent='📺 PiP';notice.style.display='none';
    });
    if(lastPath){
      buildPipDOM(pipWin.document,lastPath.path,lastPath.start,lastPath.goal,lastPath.isAllRooms);
    }else{
      pipWin.document.head.innerHTML=`<meta charset="UTF-8"><style>${PIP_CSS}</style>`;
      const lgHtml=`<div class="li"><div class="ld" style="background:#059669"></div><span style="color:#34d399">좌</span></div><div class="li"><div class="ld" style="background:#7c3aed"></div><span style="color:#c084fc">중</span></div><div class="li"><div class="ld" style="background:#0ea5e9"></div><span style="color:#38bdf8">우</span></div>`;
      pipWin.document.body.innerHTML=`<div id="hd"><span class="t">🗺 동선 PiP</span><span class="b">대기중</span></div><div id="pb"><div id="pf"></div></div><div id="lg">${lgHtml}</div><div id="ct"><div class="wait"><div class="ic">🧭</div><div>메인 창에서<br>경로를 탐색하면<br>여기에 표시됩니다</div></div></div><div id="ft"><span id="fi">경로 없음</span><span id="fc"></span></div>`;
    }
  }catch(e){openFallbackPip();}
}

function openFallbackPip(){
  const btn=document.getElementById('pip-btn');
  const ch=new BroadcastChannel('maze_pip_fb');
  const escapedCss=PIP_CSS.replace(/\\/g,'\\\\').replace(/`/g,'\\`');
  const html=`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>동선 PiP</title><style>${PIP_CSS}</style></head><body>
  <div id="hd"><span class="t">🗺 동선 PiP</span><span class="b" id="badge">대기중</span></div>
  <div id="pb"><div id="pf"></div></div>
  <div id="lg">
    <div class="li"><div class="ld" style="background:#059669"></div><span style="color:#34d399">좌 포탈</span></div>
    <div class="li"><div class="ld" style="background:#7c3aed"></div><span style="color:#c084fc">중 포탈</span></div>
    <div class="li"><div class="ld" style="background:#0ea5e9"></div><span style="color:#38bdf8">우 포탈</span></div>
  </div>
  <div id="ct"><div class="wait"><div class="ic">🧭</div><div>메인 창에서<br>경로를 탐색하면<br>여기에 표시됩니다</div></div></div>
  <div id="ft"><span id="fi">경로 없음</span><span id="fc"></span></div>
  <script>
  const PS={"좌":{pipMain:"#059669",pipDark:"#064e3b",text:"#34d399"},"중":{pipMain:"#7c3aed",pipDark:"#2e1065",text:"#c084fc"},"우":{pipMain:"#0ea5e9",pipDark:"#0c2a4a",text:"#38bdf8"}};
  const ch=new BroadcastChannel('maze_pip_fb');
  ch.onmessage=function(e){
    const{path,start,goal,isAllRooms}=e.data;
    const ts=path.length-1;
    document.getElementById('badge').textContent=isAllRooms?'전체방':'최단';
    document.getElementById('fi').textContent=start+'번 → '+goal+'번'+(goal===16?' 🏆':'');
    document.getElementById('fc').textContent=ts+'회 이동';
    document.getElementById('pf').style.width='0%';
    let h='';
    path.forEach((step,i)=>{
      const isFirst=i===0,isLast=i===path.length-1;
      const bc=isFirst?'s':isLast?'g':'m';
      const lbl=isFirst?'S':isLast?'G':i;
      let aw='';
      if(!isLast&&step.portal){
        const s=PS[step.portal];
        aw='<div class="aw"><div class="al" style="background:linear-gradient(to right,'+s.pipMain+'44,'+s.pipMain+')"></div><div class="pl" style="background:'+s.pipDark+';border-color:'+s.pipMain+';color:'+s.text+';text-shadow:0 0 6px '+s.pipMain+'88">'+step.portal+'</div></div>';
      }
      h+='<div class="st" data-i="'+i+'"><div class="ix">'+lbl+'</div><div class="rb '+bc+'">'+step.room+(isLast&&goal===16?'🏆':'')+'</div>'+aw+'</div>';
    });
    document.getElementById('ct').innerHTML=h;
    document.querySelectorAll('.st').forEach(el=>{
      el.addEventListener('click',()=>{
        const idx=parseInt(el.dataset.i);
        document.querySelectorAll('.st').forEach((s,i)=>{s.classList.remove('done','cur');if(i<idx)s.classList.add('done');if(i===idx)s.classList.add('cur');});
        document.getElementById('pf').style.width=(ts>0?Math.round((idx/ts)*100):0)+'%';
      });
    });
  };
  <\/script></body></html>`;
  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  window.open(url,'maze_pip_fb','width=260,height=520,top=60,left=60,resizable=yes');
  btn.classList.add('active');btn.textContent='📺 PiP 켜짐';
  document.getElementById('pip-notice').style.display='block';
  window._fbChannel=ch;
  setTimeout(()=>{if(lastPath)ch.postMessage(lastPath);URL.revokeObjectURL(url);},700);
}

function updatePip(path,start,goal,isAllRooms){
  if(pipWin&&!pipWin.closed){
    buildPipDOM(pipWin.document,path,start,goal,isAllRooms);
  }else if(window._fbChannel){
    window._fbChannel.postMessage({path,start,goal,isAllRooms});
  }
}

function bfs(start,goal){
  if(start===goal)return[{room:start,portal:null}];
  const queue=[[start,[{room:start,portal:null}]]];
  const visited=new Set([start]);
  while(queue.length>0){
    const[cur,path]=queue.shift();
    for(const p of PORTAL_LABELS){
      const next=PORTALS[p][cur];if(!next)continue;
      const np=[...path,{room:next,portal:p}];
      if(next===goal)return np;
      if(!visited.has(next)){visited.add(next);queue.push([next,np]);}
    }
  }
  return null;
}

function findHamiltonianPath(start,goal){
  const path=[{room:start,portal:null}];
  const visited=new Set([start]);
  function dfs(){
    const cur=path[path.length-1].room;
    if(visited.size===16&&cur===goal)return true;
    for(const p of PORTAL_LABELS){
      const next=PORTALS[p][cur];
      if(!next||visited.has(next))continue;
      if(next===goal&&visited.size<15)continue;
      path.push({room:next,portal:p});visited.add(next);
      if(dfs())return true;
      path.pop();visited.delete(next);
    }
    return false;
  }
  return dfs()?path:null;
}

function setMode(mode){
  currentMode=mode;
  document.getElementById('btn-mode-short').classList.toggle('active',mode==='short');
  document.getElementById('btn-mode-all').classList.toggle('active',mode==='all');
  document.getElementById('all-rooms-notice').style.display=mode==='all'?'block':'none';
  document.getElementById('result-wrap').style.display='none';
  document.getElementById('error-box').style.display='none';
  document.getElementById('find-btn').textContent=mode==='all'?'🗺️ 전체 경로 탐색':'⚡ 경로 탐색';
}
// 초기 상태: 모든방 경유 notice 보이기
document.getElementById('all-rooms-notice').style.display='block';

function setPreset(btn){
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('input-to').value=btn.dataset.val;
}
document.getElementById('input-to').addEventListener('input',function(){
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.toggle('active',b.dataset.val===this.value));
});
document.addEventListener('keydown',e=>{if(e.key==='Enter')findPath();});

function showError(msg){
  const b=document.getElementById('error-box');b.textContent='⚠️ '+msg;b.style.display='block';
  document.getElementById('result-wrap').style.display='none';
}

function findPath(){
  const fv=document.getElementById('input-from').value;
  const tv=document.getElementById('input-to').value;
  document.getElementById('error-box').style.display='none';
  const start=parseInt(fv),goal=parseInt(tv);
  if(!fv||isNaN(start)||start<1||start>16)return showError('현재 위치를 1~16 사이로 입력해주세요.');
  if(!tv||isNaN(goal)||goal<1||goal>16)return showError('목적지를 1~16 사이로 입력해주세요.');
  if(start===goal)return showError('현재 위치와 목적지가 같아요!');

  if(currentMode==='short'){
    const path=bfs(start,goal);
    if(!path)return showError('해당 목적지에 도달할 수 없어요.');
    lastPath={path,start,goal,isAllRooms:false};
    renderResult(start,goal,path,false);
    updatePip(path,start,goal,false);
  }else{
    const wrap=document.getElementById('result-wrap');
    wrap.innerHTML=`<div class="loading-box"><div class="spinner"></div><br>전체 경로 탐색 중...</div>`;
    wrap.style.display='flex';
    setTimeout(()=>{
      const path=findHamiltonianPath(start,goal);
      if(!path){
        wrap.innerHTML=`<div class="impossible-box">❌ <strong>${start}번</strong>에서 출발해 모든 방을 방문하고<br><strong>${goal}번</strong>으로 끝나는 경로가 없습니다.<br><span style="color:#f87171;font-size:11px">출발지/목적지를 바꿔보세요.</span></div>`;
      }else{
        lastPath={path,start,goal,isAllRooms:true};
        renderResult(start,goal,path,true);
        updatePip(path,start,goal,true);
      }
    },50);
  }
}

function portalArrowHtml(portal){
  const s=PORTAL_STYLE[portal];
  return `<div class="portal-arrow">
    <div class="portal-line" style="background:linear-gradient(to right,${s.main}44,${s.main});height:2px;"></div>
    <div class="portal-tag ${s.cls}">${portal}</div>
  </div>`;
}

function renderResult(start,goal,path,isAllRooms){
  const steps=path.length-1;
  const pc={"좌":0,"중":0,"우":0};
  path.forEach(s=>{if(s.portal)pc[s.portal]++;});

  // 범례
  const legendHtml=`<div class="portal-legend">
    <div class="legend-item"><div class="legend-dot" style="background:#059669;box-shadow:0 0 4px #059669"></div><span style="color:#34d399">좌 포탈</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#7c3aed;box-shadow:0 0 4px #7c3aed"></div><span style="color:#c084fc">중 포탈</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#0ea5e9;box-shadow:0 0 4px #0ea5e9"></div><span style="color:#38bdf8">우 포탈</span></div>
  </div>`;

  let sh='';
  path.forEach((step,i)=>{
    const isFirst=i===0,isLast=i===path.length-1;
    const rc=isFirst?'start':isLast?'goal':'mid';
    const nc=isFirst?'start':isLast?'goal':'mid';
    const nl=isFirst?'S':isLast?'G':i;
    const ah=(!isLast&&step.portal)?portalArrowHtml(step.portal):'';
    sh+=`<div class="step-row"><div class="step-num ${nc}">${nl}</div><div class="step-room ${rc}">${step.room}${isLast&&goal===16?' 🏆':''}</div>${ah}</div>`;
  });

  const sth=PORTAL_LABELS.map(p=>{
    const s=PORTAL_STYLE[p],u=pc[p]>0;
    return`<div class="stat-box" style="border:1px solid ${u?s.main+'66':'#1e293b'};opacity:${u?1:0.4}">
      <div class="stat-name" style="color:${s.text}">${p} 포탈</div>
      <div class="stat-count">${pc[p]}</div>
      <div class="stat-unit">회 사용</div>
    </div>`;
  }).join('');

  const mt=isAllRooms?`<span style="color:#86efac;font-size:11px;display:block;margin-top:3px">🗺️ 16개 방 전체 경유</span>`:'';
  const wrap=document.getElementById('result-wrap');
  wrap.innerHTML=`
    <div class="summary-bar">
      <div><div class="route-title">${isAllRooms?'전체 방 경유':'최단 경로'}</div><div class="route-name">${start}번 → ${goal}번${goal===16?' 🏆':''}</div>${mt}</div>
      <div><div class="count-label">포탈 이동</div><div><span class="count-num">${steps}</span><span class="count-unit">회</span></div></div>
    </div>
    <div class="steps-card"><div class="steps-label">STEP BY STEP</div>${legendHtml}${sh}</div>
    <div class="portal-stats">${sth}</div>`;
  wrap.style.display='flex';
}
</script>
